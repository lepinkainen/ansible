---
# Note: apt cache is updated by system-basics role

- name: Install prometheus-node-exporter
  package:
    name: prometheus-node-exporter
    state: present
  tags: [monitoring, packages]

- name: Create systemd override directory
  file:
    path: /etc/systemd/system/prometheus-node-exporter.service.d
    state: directory
    mode: '0755'
  tags: [monitoring, config, system]

- name: Configure node_exporter to bind to Tailscale interface
  template:
    src: debian/node_exporter.service.j2
    dest: /etc/systemd/system/prometheus-node-exporter.service.d/override.conf
    mode: '0644'
    backup: yes
  notify:
    - restart prometheus-node-exporter
    - reload systemd
  tags: [monitoring, config, system]

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  tags: [monitoring, service, system]