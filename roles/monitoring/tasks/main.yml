---
# Check Tailscale dependency for secure monitoring
- name: Check Tailscale is enabled
  fail:
    msg: "Monitoring requires Tailscale to be enabled. Set tailscale_config.enabled: true"
  when:
    - monitoring_config.node_exporter.enabled | default(false)
    - not (tailscale_config.enabled | default(false))
  tags: [monitoring, validation]

- name: Gather Tailscale network facts
  setup:
    gather_subset:
      - "network"
  when: monitoring_config.node_exporter.enabled | default(false)
  tags: [monitoring, network]

# Distribution-specific node_exporter installation
- name: Include distribution-specific tasks
  include_tasks: "{{ ansible_os_family }}.yml"
  when: monitoring_config.node_exporter.enabled | default(false)
  tags: [monitoring, packages, system]

# Common tasks for all distributions
- name: Check if node_exporter is installed
  command: which prometheus-node-exporter
  register: node_exporter_check
  changed_when: false
  failed_when: false
  when: monitoring_config.node_exporter.enabled | default(false)
  tags: [monitoring, validation]

- name: Get Tailscale IP address
  set_fact:
    tailscale_ip: "{{ ansible_tailscale0.ipv4.address | default('127.0.0.1') }}"
  when:
    - monitoring_config.node_exporter.enabled | default(false)
    - ansible_tailscale0 is defined
  tags: [monitoring, network, config]

- name: Enable and start node_exporter service
  systemd:
    name: prometheus-node-exporter
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [monitoring, service]
  when:
    - monitoring_config.node_exporter.enabled | default(false)
    - node_exporter_check.rc == 0

- name: Check node_exporter service status
  systemd:
    name: prometheus-node-exporter
  register: node_exporter_service_status
  when: monitoring_config.node_exporter.enabled | default(false)
  tags: [monitoring, service, validation]

- name: Verify node_exporter metrics endpoint
  uri:
    url: "http://{{ tailscale_ip | default('127.0.0.1') }}:{{ monitoring_config.node_exporter.port | default(9100) }}/metrics"
    method: GET
    timeout: 10
  register: metrics_check
  failed_when: false
  changed_when: false
  when:
    - monitoring_config.node_exporter.enabled | default(false)
    - tailscale_ip is defined
  tags: [monitoring, validation, network]

- name: Display monitoring status
  debug:
    msg:
      - "Node exporter status: {{ 'RUNNING' if node_exporter_service_status.status.ActiveState == 'active' else 'FAILED' }}"
      - "Metrics endpoint: http://{{ tailscale_ip | default('localhost') }}:{{ monitoring_config.node_exporter.port | default(9100) }}/metrics"
      - "Metrics accessible: {{ 'YES' if metrics_check.status == 200 else 'NO' }}"
  when: monitoring_config.node_exporter.enabled | default(false)
  tags: [monitoring, validation]