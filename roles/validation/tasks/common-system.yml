---
# Simplified common system validations

- name: Validate hostname
  assert:
    that: ansible_hostname == vault_hostname
    success_msg: "Hostname matches: {{ ansible_hostname }}"
    fail_msg: "Hostname mismatch: expected {{ vault_hostname }}, got {{ ansible_hostname }}"
    quiet: true
  register: hostname_check
  ignore_errors: true

- name: Record hostname status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'hostname': '✅ PASS' if hostname_check is succeeded else 
        '❌ FAIL (expected: ' ~ vault_hostname ~ ', actual: ' ~ ansible_hostname ~ ')'
      }) }}

- name: Get current timezone
  command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Validate timezone
  assert:
    that: current_timezone.stdout == timezone
    success_msg: "Timezone matches: {{ timezone }}"
    fail_msg: "Timezone mismatch: expected {{ timezone }}, got {{ current_timezone.stdout }}"
    quiet: true
  register: timezone_check
  ignore_errors: true

- name: Record timezone status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'timezone': '✅ PASS' if timezone_check is succeeded else 
        '❌ FAIL (expected: ' ~ timezone ~ ', actual: ' ~ current_timezone.stdout ~ ')'
      }) }}

- name: Check users exist
  getent:
    database: passwd
    key: "{{ item }}"
  loop:
    - "{{ vault_target_user }}"
    - "{{ vault_deploy_user }}"
  register: users_check
  ignore_errors: true

- name: Record users status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'users': '✅ PASS' if users_check is succeeded else '❌ FAIL (missing users)'
      }) }}

- name: Consolidate system validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'system': '✅ PASS' if (
          validation_results.hostname is defined and '✅' in validation_results.hostname and
          validation_results.timezone is defined and '✅' in validation_results.timezone and
          validation_results.users is defined and '✅' in validation_results.users
        ) else '❌ FAIL'
      }) }}
