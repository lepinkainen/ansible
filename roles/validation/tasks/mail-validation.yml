---
# Simplified mail system validation

- name: Validate mailrise container
  include_tasks: validate-service.yml
  vars:
    check_name: mailrise
    port: 8025
  when: mail_config.enable_mailrise | default(false)

- name: Skip mailrise validation when disabled
  set_fact:
    validation_results: "{{ validation_results | combine({'mailrise': '⚠️ DISABLED'}) }}"
  when: not (mail_config.enable_mailrise | default(false))

- name: Parse SMTP host and port
  set_fact:
    smtp_host: "{{ vault_smtp_host.split(':')[0] }}"
    smtp_port: "{{ vault_smtp_host.split(':')[1] | default('25') }}"
  when: vault_smtp_host is defined

- name: Test SMTP connectivity
  wait_for:
    host: "{{ smtp_host }}"
    port: "{{ smtp_port }}"
    timeout: 10
  register: smtp_test
  ignore_errors: true
  when: 
    - validation_config.mail_connectivity_test | default(true)
    - vault_smtp_host is defined

- name: Record SMTP status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'smtp': '✅ PASS' if smtp_test is succeeded else 
        ('⚠️ SKIPPED' if not (validation_config.mail_connectivity_test | default(true)) or vault_smtp_host is not defined 
        else '❌ FAIL (cannot reach ' ~ vault_smtp_host | default('unknown') ~ ')')
      }) }}

- name: Test Discord webhook
  uri:
    url: "{{ vault_discord_url }}"
    method: POST
    body_format: json
    body:
      content: "Ansible validation test from {{ inventory_hostname }}"
    status_code: [200, 204, 429]
    timeout: 10
  register: discord_test
  ignore_errors: true
  when:
    - validation_config.mail_connectivity_test | default(true)
    - mail_config.enable_mailrise | default(false)
    - vault_discord_url is defined
    - vault_discord_url is match('^https://')

- name: Record Discord webhook status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'discord': '✅ PASS' if discord_test is succeeded else 
        ('⚠️ SKIPPED' if not (mail_config.enable_mailrise | default(false)) or vault_discord_url is not defined
        else '❌ FAIL')
      }) }}

- name: Check mail queue
  command: mailq
  register: mailq_check
  changed_when: false
  ignore_errors: true

- name: Record mail queue status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'mail_queue': '✅ PASS' if mailq_check.rc == 0 else '❌ FAIL'
      }) }}

- name: Consolidate mail validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'mail': '✅ PASS' if (
          (validation_results.mailrise is defined and '❌' not in validation_results.mailrise) and
          (validation_results.smtp is defined and '❌' not in validation_results.smtp) and
          (validation_results.mail_queue is defined and '❌' not in validation_results.mail_queue)
        ) else '❌ FAIL'
      }) }}
