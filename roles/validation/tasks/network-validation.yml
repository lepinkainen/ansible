---
# Simplified network and Tailscale validation

- name: Test DNS resolution
  command: nslookup google.com
  register: dns_test
  changed_when: false
  ignore_errors: true

- name: Test internet connectivity
  uri:
    url: https://httpbin.org/ip
    method: GET
    timeout: 10
  register: internet_test
  ignore_errors: true

- name: Record basic network status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'network_basic': '✅ PASS' if (dns_test.rc == 0 and internet_test.status == 200) else 
        '❌ FAIL (DNS: ' ~ ('ok' if dns_test.rc == 0 else 'failed') ~ 
        ', internet: ' ~ ('ok' if internet_test.status | default(0) == 200 else 'failed') ~ ')'
      }) }}

- name: Validate Tailscale
  include_tasks: validate-service.yml
  vars:
    check_name: tailscale
    service_name: tailscaled
    command: tailscale status
  when: tailscale_config.enabled | default(false)

- name: Skip Tailscale validation when disabled
  set_fact:
    validation_results: "{{ validation_results | combine({'tailscale': '⚠️ DISABLED'}) }}"
  when: not (tailscale_config.enabled | default(false))

- name: Validate SSH service
  include_tasks: validate-service.yml
  vars:
    check_name: ssh
    service_name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    command: sshd -t

- name: Check SSH hardening status
  lineinfile:
    path: /etc/ssh/sshd_config
    line: "PasswordAuthentication no"
    state: present
  check_mode: true
  register: ssh_hardening

- name: Record SSH hardening status
  set_fact:
    ssh_hardening_applied: "{{ 'yes' if ssh_hardening is not changed else 'no' }}"

- name: Check firewall status
  block:
    - name: Check UFW status (Debian)
      command: ufw status
      register: ufw_status
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Check nftables status (Arch)
      systemd:
        name: nftables
        state: started
      check_mode: true
      register: nftables_status
      ignore_errors: true
      when: ansible_os_family == "Archlinux"

    - name: Record firewall status
      set_fact:
        firewall_status: >-
          {{ 'active' if (ansible_os_family == 'Debian' and 'Status: active' in ufw_status.stdout | default('')) 
             or (ansible_os_family == 'Archlinux' and nftables_status is not changed)
             else 'inactive' }}
  ignore_errors: true

- name: Consolidate network validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'network': '✅ PASS' if (
          validation_results.network_basic is defined and '✅' in validation_results.network_basic and
          validation_results.ssh is defined and '✅' in validation_results.ssh and
          (validation_results.tailscale is defined and '❌' not in validation_results.tailscale)
        ) else '❌ FAIL'
      }) }}

- name: Display network details
  debug:
    msg:
      - "SSH Hardening: {{ ssh_hardening_applied | default('unknown') }}"
      - "Firewall: {{ firewall_status | default('unknown') }}"
  when: validation_config.detailed_output | default(false)
