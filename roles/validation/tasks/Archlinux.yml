---
# Simplified Arch Linux-specific validation

- name: Validate pacman-upgrade timer
  include_tasks: validate-service.yml
  vars:
    check_name: pacman_upgrade
    service_name: pacman-upgrade.timer

- name: Check Arch config files exist
  stat:
    path: "{{ item.path }}"
  loop:
    - { path: /etc/systemd/system/pacman-upgrade.service, name: pacman-upgrade.service }
    - { path: /usr/local/bin/pacman-upgrade.sh, name: pacman-upgrade.sh }
    - { path: /etc/msmtprc, name: msmtp }
  register: arch_configs

- name: Record Arch config status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'arch_configs': '✅ PASS' if (arch_configs.results | selectattr('stat.exists', 'equalto', false) | list | length == 0)
        else '❌ FAIL (missing: ' ~ (arch_configs.results | selectattr('stat.exists', 'equalto', false) | map(attribute='item.name') | join(', ')) ~ ')'
      }) }}

- name: Check MOTD script
  stat:
    path: /etc/profile.d/motd.sh
  register: arch_motd

- name: Record MOTD status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'arch_motd': '✅ PASS' if (arch_motd.stat.exists and arch_motd.stat.executable) 
        else '❌ FAIL (missing or not executable)'
      }) }}

- name: Validate pacman
  command: pacman-conf
  register: pacman_check
  changed_when: false
  ignore_errors: true

- name: Record pacman status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'arch_pacman': '✅ PASS' if pacman_check.rc == 0 else '❌ FAIL'
      }) }}

- name: Consolidate Arch-specific validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'security': '✅ PASS' if (
          validation_results.pacman_upgrade is defined and '✅' in validation_results.pacman_upgrade and
          validation_results.arch_configs is defined and '✅' in validation_results.arch_configs
        ) else '❌ FAIL'
      }) }}
