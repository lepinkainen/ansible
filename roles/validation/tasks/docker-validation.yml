---
# Simplified Docker validation using helper

- name: Validate Docker service
  include_tasks: validate-service.yml
  vars:
    check_name: docker_service
    service_name: docker
    command: docker info

- name: Check Docker socket exists
  stat:
    path: /var/run/docker.sock
  register: docker_socket

- name: Record Docker socket status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'docker_socket': '✅ PASS' if docker_socket.stat.exists else '❌ FAIL (socket missing)'
      }) }}

- name: Run Docker smoke test
  community.docker.docker_container:
    name: validation-hello-world
    image: hello-world
    state: started
    auto_remove: true
    detach: false
  register: docker_smoke
  ignore_errors: true
  when: validation_config.docker_smoke_test | default(true)

- name: Record Docker smoke test status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'docker_smoke': '✅ PASS' if docker_smoke is succeeded else 
        ('⚠️ SKIPPED' if not (validation_config.docker_smoke_test | default(true)) else '❌ FAIL')
      }) }}

- name: Check user Docker group membership
  command: groups {{ item }}
  loop:
    - "{{ vault_target_user }}"
    - "{{ vault_deploy_user }}"
  register: docker_groups
  changed_when: false
  ignore_errors: true

- name: Record Docker groups status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'docker_users': '✅ PASS' if (docker_groups.results | selectattr('stdout', 'search', 'docker') | list | length == 2) 
        else '❌ FAIL (users not in docker group)'
      }) }}

- name: Consolidate Docker validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'docker': '✅ PASS' if (
          validation_results.docker_service is defined and '✅' in validation_results.docker_service and
          validation_results.docker_socket is defined and '✅' in validation_results.docker_socket and
          (validation_results.docker_smoke is defined and '❌' not in validation_results.docker_smoke)
        ) else '❌ FAIL'
      }) }}
