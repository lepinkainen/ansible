---
# Simplified Debian-specific validation

- name: Validate unattended-upgrades
  include_tasks: validate-service.yml
  vars:
    check_name: unattended_upgrades
    service_name: unattended-upgrades

- name: Check Debian config files exist
  stat:
    path: "{{ item.path }}"
  loop:
    - { path: /etc/apt/apt.conf.d/50unattended-upgrades, name: unattended-upgrades }
    - { path: /etc/ssmtp/ssmtp.conf, name: ssmtp }
  register: debian_configs

- name: Record Debian config status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'debian_configs': '✅ PASS' if (debian_configs.results | selectattr('stat.exists', 'equalto', false) | list | length == 0)
        else '❌ FAIL (missing: ' ~ (debian_configs.results | selectattr('stat.exists', 'equalto', false) | map(attribute='item.name') | join(', ')) ~ ')'
      }) }}

- name: Check MOTD scripts
  stat:
    path: "/etc/update-motd.d/{{ item }}"
  loop: [01-logo, 10-uname, 15-diskspace, 20-docker, 30-security-updates, 92-unattended-upgrades]
  register: motd_scripts

- name: Record MOTD status
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'debian_motd': '✅ PASS' if (motd_scripts.results | selectattr('stat.exists', 'equalto', false) | list | length == 0)
        else '❌ FAIL (' ~ (motd_scripts.results | selectattr('stat.exists', 'equalto', false) | list | length) ~ ' missing)'
      }) }}

- name: Consolidate Debian-specific validation
  set_fact:
    validation_results: >-
      {{ validation_results | combine({
        'security': '✅ PASS' if (
          validation_results.unattended_upgrades is defined and '✅' in validation_results.unattended_upgrades and
          validation_results.debian_configs is defined and '✅' in validation_results.debian_configs
        ) else '❌ FAIL'
      }) }}
