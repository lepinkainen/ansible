---
# Debian unattended-upgrades
# Note: apt cache is updated by system-basics role

- name: Install unattended-upgrades package (Debian)
  apt:
    name: unattended-upgrades
    state: present
  tags: [upgrades, security, install]

- name: Configure unattended-upgrades (Debian)
  template:
    src: debian/50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    backup: true
  tags: [upgrades, security, config]

- name: Configure auto upgrades (Debian)
  template:
    src: debian/20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    backup: true
  tags: [upgrades, security, config]