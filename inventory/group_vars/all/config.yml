---
# Common configuration variables shared across all server groups
# Distribution-specific overrides should be placed in group_vars/<group>/config.yml

# System Configuration
timezone: Europe/Helsinki
locales:
  - "en_US.UTF-8"
  - "en_GB.UTF-8"

# NOTE: CLI packages are managed per-user by mise + chezmoi (dotfiles repo:
# dot_config/mise/config.toml.tmpl). The old `packages` role was removed; system
# daemons are installed by their owning roles (unattended-upgrades, mail-config,
# monitoring).

# User Configuration
user_shell: "/usr/bin/fish"

# Mail Configuration (non-sensitive)
# Configured to use localhost:8025 for mailrise integration
mail_config:
  from_line_override: true
  enable_mailrise: true

# MOTD Configuration (non-sensitive)
motd_config:
  enable_logo: true
  enable_uname: true
  enable_diskspace: true
  enable_docker: true
  enable_security_updates: true
  enable_unattended_upgrades: true

# Disk Usage Monitoring (non-sensitive)
# Default locations for disk usage monitoring in MOTD
# Can be overridden in host_vars for specific servers
disk_usage_locations:
  - "/"

# Auto-update/upgrade configuration
auto_reboot_config:
  automatic_reboot: true
  automatic_reboot_time: "02:00"

# Tailscale Configuration (non-sensitive)
tailscale_config:
  enabled: true # Required for monitoring - enables secure cross-network communication

# Monitoring Configuration (non-sensitive)
monitoring_config:
  node_exporter:
    enabled: true # Enable by default for all servers
    port: 9100
    bind_interface: "tailscale0"
    collect_systemd: true
  prometheus:
    enabled: false # Only on designated server
    port: 9090
    scrape_interval: "30s"

# Logrotate Configuration
logrotate_config:
  rotate: 4
  frequency: weekly
  compress: true
  delaycompress: true
  missingok: true
  notifempty: true
  create: true
  dateext: true
  docker_logs:
    enabled: true
    rotate: 3
    size: 100M
    frequency: daily
  custom_logs: []
  # Example custom log:
  # - name: myapp
  #   path: /var/log/myapp/*.log
  #   rotate: 7
  #   frequency: daily

# Validation Configuration (non-sensitive)
validation_config:
  enabled: true
  fail_fast: false # Continue on validation failures
  docker_smoke_test: true # Run docker hello-world
  mail_connectivity_test: true # Test mail/Discord connectivity
  detailed_output: false # Show detailed check results
  timeout_seconds: 30 # Per-check timeout
